name: CI

on:
  push:
    branches: [master, main]
    tags:
      - "v*"
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-test.txt
      - run: pip install -r requirements-test.txt
      - name: Python lint (ruff)
        run: |
          pip install "ruff>=0.4"
          ruff check app
      - run: python -m pytest tests/unit/ -v --tb=short
      - run: python -m pytest tests/integration/test_api_integration.py -v --tb=short
      - run: python -m pytest tests/e2e/ -v --tb=short --run-e2e

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --run --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend-tests, lint-and-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  release:
    name: Release Windows Installer
    runs-on: windows-latest
    # build must pass before we cut a release — previously missing, so a
    # broken frontend build could ship via a tag push.
    needs: [backend-tests, lint-and-test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build and publish
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

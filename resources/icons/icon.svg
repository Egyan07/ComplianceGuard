<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="40%" stop-color="#0091EA"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00B0FF" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </linearGradient>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer shield shape - angular/geometric -->
  <path d="M256 28 L452 118 C452 118 462 320 256 484 C50 320 60 118 60 118 Z"
        fill="url(#shieldGrad)" filter="url(#outerGlow)"/>

  <!-- Inner dark shield -->
  <path d="M256 52 L430 132 C430 132 438 306 256 456 C74 306 82 132 82 132 Z"
        fill="url(#innerGrad)"/>

  <!-- Circuit line patterns on left side -->
  <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Horizontal circuit lines -->
    <line x1="110" y1="180" x2="200" y2="180"/>
    <circle cx="200" cy="180" r="3" fill="#00E5FF" fill-opacity="0.6"/>
    <line x1="200" y1="180" x2="200" y2="220"/>
    <circle cx="200" cy="220" r="3" fill="#00E5FF" fill-opacity="0.6"/>

    <line x1="120" y1="240" x2="180" y2="240"/>
    <circle cx="180" cy="240" r="3" fill="#00E5FF" fill-opacity="0.6"/>
    <line x1="180" y1="240" x2="180" y2="280"/>

    <line x1="130" y1="300" x2="190" y2="300"/>
    <circle cx="190" cy="300" r="3" fill="#00E5FF" fill-opacity="0.6"/>
    <line x1="190" y1="300" x2="190" y2="330"/>
    <circle cx="190" cy="330" r="3" fill="#00E5FF" fill-opacity="0.6"/>

    <line x1="150" y1="360" x2="200" y2="360"/>
    <circle cx="200" cy="360" r="2.5" fill="#00E5FF" fill-opacity="0.5"/>
  </g>

  <!-- Circuit line patterns on right side -->
  <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="402" y1="180" x2="312" y2="180"/>
    <circle cx="312" cy="180" r="3" fill="#00E5FF" fill-opacity="0.6"/>
    <line x1="312" y1="180" x2="312" y2="220"/>
    <circle cx="312" cy="220" r="3" fill="#00E5FF" fill-opacity="0.6"/>

    <line x1="392" y1="240" x2="332" y2="240"/>
    <circle cx="332" cy="240" r="3" fill="#00E5FF" fill-opacity="0.6"/>
    <line x1="332" y1="240" x2="332" y2="280"/>

    <line x1="382" y1="300" x2="322" y2="300"/>
    <circle cx="322" cy="300" r="3" fill="#00E5FF" fill-opacity="0.6"/>
    <line x1="322" y1="300" x2="322" y2="330"/>
    <circle cx="322" cy="330" r="3" fill="#00E5FF" fill-opacity="0.6"/>

    <line x1="362" y1="360" x2="312" y2="360"/>
    <circle cx="312" cy="360" r="2.5" fill="#00E5FF" fill-opacity="0.5"/>
  </g>

  <!-- Hexagonal nodes pattern (center area) -->
  <g fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.25">
    <polygon points="256,140 280,154 280,182 256,196 232,182 232,154"/>
    <polygon points="220,200 244,214 244,242 220,256 196,242 196,214"/>
    <polygon points="292,200 316,214 316,242 292,256 268,242 268,214"/>
  </g>

  <!-- Center checkmark with glow -->
  <g transform="translate(256, 290)" filter="url(#neonGlow)">
    <path d="M-65 -10 L-25 35 L70 -55"
          fill="none"
          stroke="url(#checkGrad)"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Inner border glow -->
  <path d="M256 52 L430 132 C430 132 438 306 256 456 C74 306 82 132 82 132 Z"
        fill="none"
        stroke="#00E5FF"
        stroke-width="1.5"
        stroke-opacity="0.3"/>

  <!-- Top keyhole/lock accent -->
  <g transform="translate(256, 120)" opacity="0.5">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#00E5FF" stroke-width="2"/>
    <rect x="-3" y="2" width="6" height="10" rx="1.5" fill="#00E5FF"/>
  </g>
</svg>
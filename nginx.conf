events {
    worker_connections 1024;
}

http {
    # Rate limiting zone (10 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Upstream services
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # Shared security header map — applied to every response on both HTTP and
    # HTTPS server blocks. CSP is locked down; HSTS is added on the HTTPS
    # server only (it's a no-op over plain HTTP and can even cause issues).
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'";
    }

    # HTTP server — redirects everything to HTTPS except the health check
    # (so container orchestrators can still probe without certs).
    server {
        listen 80;
        server_name _;

        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server — the real deployment target.
    # Requires SSL certs mounted at /etc/nginx/ssl/ (see ./ssl/README.md).
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy $csp_header always;

        # Block API schema endpoints from the public internet.
        # Backend devs should reach Swagger UI through a port-forward to the
        # backend container, not via the public nginx.
        location = /docs        { return 404; }
        location = /redoc       { return 404; }
        location = /openapi.json { return 404; }

        # API routes → backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check → backend
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Everything else → frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

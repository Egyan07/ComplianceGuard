# ComplianceGuard SOC 2 Automation Platform - Docker Compose Configuration
# Multi-container deployment for development and production

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: complianceguard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: complianceguard
      POSTGRES_USER: ${DB_USER:-complianceguard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-complianceguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - complianceguard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-complianceguard} -d complianceguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complianceguard-backend
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${DB_USER:-complianceguard}:${DB_PASSWORD:-complianceguard}@db:5432/complianceguard

      # Security Configuration
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALGORITHM: ${ALGORITHM:-HS256}

      # AWS Integration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}

      # Application Configuration
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}

      # CORS Configuration
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - complianceguard-network
    volumes:
      - ./backend/app:/app/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: complianceguard-frontend
    restart: unless-stopped
    environment:
      # API Configuration
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-ComplianceGuard SOC 2 Platform}

      # Environment
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - complianceguard-network
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: Nginx Reverse Proxy (uncomment for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: complianceguard-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - complianceguard-network

volumes:
  postgres_data:
    driver: local

networks:
  complianceguard-network:
    driver: bridge

# Development override configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
---
version: '3.8'
services:
  backend:
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]

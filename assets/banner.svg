<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <!-- Background -->
  <rect width="1200" height="300" fill="#FFFFFF"/>

  <!-- Top accent -->
  <rect width="1200" height="3" fill="#2563EB"/>

  <!-- Logo mark -->
  <g transform="translate(88, 150)">
    <rect x="-28" y="-28" width="56" height="56" rx="13" fill="#2563EB"/>
    <text font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
          font-size="26" font-weight="700" fill="#FFFFFF"
          x="0" y="0" dy="0.35em" text-anchor="middle" letter-spacing="-1">CG</text>
  </g>

  <!-- Title -->
  <text x="140" y="130"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="46" font-weight="700" fill="#111827" letter-spacing="-1">
    ComplianceGuard
  </text>

  <!-- Accent underline -->
  <rect x="142" y="142" width="42" height="3" rx="1.5" fill="#2563EB" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="142" y="172"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="15" fill="#6B7280" font-weight="400">
    SOC 2 Type II · Desktop Compliance Automation
  </text>

  <!-- Tagline -->
  <text x="142" y="202"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="12" fill="#2563EB" font-weight="600" letter-spacing="3">
    COLLECT · EVALUATE · COMPLY
  </text>

  <!-- Version badge -->
  <g transform="translate(1060, 16)">
    <rect width="85" height="22" rx="11" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="42.5" y="15" font-family="'Courier New', Courier, monospace"
          font-size="11" fill="#2563EB" text-anchor="middle" font-weight="600">v1.1.0</text>
  </g>

  <!-- Bottom accent -->
  <rect y="297" width="1200" height="3" fill="#2563EB"/>
</svg>
